<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#eee8de">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Elaine Shadowing">
    <title>Elaine Shadowing Studio</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png?v=12">
    <link rel="icon" href="assets/icons/icon-192.png?v=12" type="image/png">
    <link rel="stylesheet" href="styles.css?v=17">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Elaine Shadowing Studio</p>
          <h1 id="courseTitle">Shadowing</h1>
        </div>
        <strong class="sentence-counter" id="sentenceCounter">1 / 1</strong>
      </header>

      <main>
        <section class="course-strip" aria-label="课程">
          <select id="courseSelect" aria-label="选择课程"></select>
          <button class="small-button" id="bigTextToggle" type="button">大字号</button>
        </section>

        <section class="progress-panel" aria-label="学习进度">
          <progress id="courseProgress" value="0" max="100"></progress>
          <span><strong id="masteredCount">0</strong> 句已掌握</span>
        </section>

        <article class="sentence-card" aria-live="polite">
          <div class="tag-row" id="tagRow"></div>
          <p class="english" id="englishText"></p>
          <p class="chinese" id="chineseText"></p>
          <p class="shadowing" id="shadowingText"></p>
          <div class="vocabulary" id="vocabularyBox"></div>
        </article>

        <section class="speed-controls" aria-label="播放速度">
          <button id="rate06Button" type="button" data-rate="0.6">0.6×</button>
          <button id="rate075Button" type="button" data-rate="0.75">0.75×</button>
          <button id="rate1Button" type="button" data-rate="1" class="active">1×</button>
          <select id="rateSelect" aria-label="当前播放速度" hidden>
            <option value="0.6">0.6×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
          </select>
        </section>

        <section class="quick-settings" aria-label="播放设置">
          <label class="switch">
            <input id="loopToggle" type="checkbox">
            <span>单句循环</span>
          </label>
          <label class="switch">
            <input id="translationToggle" type="checkbox" checked>
            <span>中文字幕</span>
          </label>
        </section>

        <section class="primary-controls" aria-label="播放控制">
          <button class="play-button" id="playButton" type="button">▶ 播放真人原声</button>
          <button id="loopButton" type="button">↻ 单句循环：关</button>
          <button id="stopButton" type="button">■ 停止</button>
          <button id="prevButton" type="button">← 上一句</button>
          <button id="nextButton" type="button">下一句 →</button>
        </section>

        <section class="status-controls" aria-label="学习状态">
          <button id="favoriteButton" type="button">收藏</button>
          <button id="masteredButton" type="button">已掌握</button>
        </section>

        <section class="recording-panel" aria-label="录音">
          <div class="recording-header">
            <div>
              <h2>跟读录音</h2>
              <p id="recordingStatus">准备录音</p>
            </div>
            <span id="recordingTimer">00:00</span>
          </div>
          <div class="recording-controls">
            <button id="recordButton" type="button">开始录音</button>
            <button id="playRecordingButton" type="button" disabled>回放录音</button>
            <button id="compareButton" type="button" disabled>原声 / 录音</button>
          </div>
        </section>
      </main>
    </div>

    <template id="vocabTemplate">
      <span class="vocab-pill"></span>
    </template>

    <script src="app.js?v=17" type="module"></script>
  </body>
</html>
